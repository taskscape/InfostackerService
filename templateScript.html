<div id="adobe-dc-view-{pdfDivId}" class="pdf-container-item"></div>
<script type="text/javascript">
    (function() {
        var displayPDF = function() {
            var adobeDCView = new AdobeDC.View({
                clientId: {token},
                divId: "adobe-dc-view-{pdfDivId}"
            });
            adobeDCView.previewFile({
                content: {
                    location: {
                        url: {pdfUrl},
                    }
                },
                metaData: {
                    fileName: {pdfName}
                }
            }, {
                embedMode: "SIZED_CONTAINER",
                showDownloadPDF: true,
                showPrintPDF: true
            });
        };

        if (window.AdobeDC) {
            displayPDF();
        } else {
            document.addEventListener("adobe_dc_view_sdk.ready", displayPDF);
        }
    })();
</script>
